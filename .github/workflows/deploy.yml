name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install and Build
        env:
          # You can update this later in GitHub Secrets if you have a real backend URL
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:5000/api' }} 
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          cd frontend
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist
          repository-name: sid-error/sid-error.github.io
          branch: main
          # Note: To push to a different repository, you MUST provide a Personal Access Token (PAT)
          # Add this token as a repository secret named DEPLOY_PAT in CollabCanvas
          token: ${{ secrets.DEPLOY_PAT }}

# Trigger workflow refresh
