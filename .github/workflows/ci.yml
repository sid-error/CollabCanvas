name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "18.x"
    - name: Install Dependencies
      run: |
        cd backend
        npm install
    - name: Run Unit Tests
      run: |
        cd backend
        npm test
    - name: Run npm audit
      run: |
        cd backend
        npm audit --audit-level=high || true

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "18.x"
    - name: Install Dependencies
      run: |
        cd frontend
        npm install
    - name: Run Unit Tests
      run: |
        cd frontend
        npm test
    - name: Run npm audit
      run: |
        cd frontend
        npm audit --audit-level=high || true

  build-backend:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "18.x"
    - name: Install Dependencies
      run: |
        cd backend
        npm install

  build-frontend:
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "18.x"
    - name: Install Dependencies
      run: |
        cd frontend
        npm install
    - name: Lint
      run: |
        cd frontend
        npm run lint
    - name: Build
      run: |
        cd frontend
        npm run build

  integration-test:
    runs-on: ubuntu-latest
    needs: test-backend

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "18.x"


    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Run Integration Tests
      env:
        MONGO_URI: mongodb://localhost:27017/collabcanvas-integration
        JWT_SECRET: integration-test-secret
        NODE_ENV: test
      run: |
        cd backend
        npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, integration-test]
    steps:
    - uses: actions/checkout@v3
    - name: Build Docker Images
      run: |
        docker compose build
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        ignore-unfixed: true
        format: 'table'
        severity: 'CRITICAL,HIGH'

