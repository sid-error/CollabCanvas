$kind: http-request
description: "Creates a new collaborative drawing room. Use 'isPublic' (boolean)
  for visibility. 'maxParticipants' minimum is 2. The test script auto-saves
  room._id into {{roomId}}. Check the console for the roomCode to share with
  others. Route: POST /api/rooms/create"
url: "{{base_url}}/api/rooms/create"
method: POST
headers:
  Authorization: Bearer {{jwt_token}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Brainstorming Session",
      "description": "Design ideas map",
      "isPublic": true,
      "maxParticipants": 10
    }
scripts:
  - type: afterResponse
    code: |-
      var json = pm.response.json();
      if (json.room && json.room._id) {
        pm.collectionVariables.set('roomId', json.room._id);
        console.log('roomId saved: ' + json.room._id);
        console.log('roomCode: ' + json.room.roomCode);
      }
    language: text/javascript
order: 1000
