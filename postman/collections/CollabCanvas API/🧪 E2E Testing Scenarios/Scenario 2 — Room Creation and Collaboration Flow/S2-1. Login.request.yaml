$kind: http-request
description: ⚠️ Update email/password to match a verified account in your DB before running.
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "john.doe@example.com",
      "password": "SecurePassword123!"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('S2-1: Login succeeds', function () {
        pm.response.to.have.status(200);
        var json = pm.response.json();
        pm.expect(json.token).to.be.a('string');
        pm.collectionVariables.set('jwt_token', json.token);
        console.log('✅ S2-1 Login: PASSED');
      });
    language: text/javascript
order: 1000
