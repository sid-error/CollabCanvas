$kind: http-request
description: Changes password. Uses the original registration password as currentPassword.
url: "{{base_url}}/api/auth/change-password"
method: PUT
headers:
  Authorization: Bearer {{jwt_token}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "currentPassword": "SecurePassword123!",
      "newPassword": "SecurePassword123!"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('S1-5: Password change succeeds', function () {
        pm.response.to.have.status(200);
        var json = pm.response.json();
        pm.expect(json.success).to.be.true;
        console.log('✅ S1-5 Change Password: PASSED');
      });
    language: text/javascript
order: 5000
