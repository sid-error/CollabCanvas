$kind: http-request
description: Deletes the room created in S5-3. Cleans up roomId and roomCode variables.
url: "{{base_url}}/api/rooms/{{roomId}}"
method: DELETE
headers:
  Authorization: Bearer {{jwt_token}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('S5-6: Room deleted / system test complete', function () {
        pm.response.to.have.status(200);
        var json = pm.response.json();
        pm.expect(json.success).to.be.true;
        pm.collectionVariables.set('roomId', '');
        pm.collectionVariables.set('roomCode', '');
        console.log('✅ S5-6 Delete Room: PASSED');
        console.log('');
        console.log('🎉 SCENARIO 5 COMPLETE — ALL SYSTEMS OPERATIONAL');
      });
    language: text/javascript
order: 6000
