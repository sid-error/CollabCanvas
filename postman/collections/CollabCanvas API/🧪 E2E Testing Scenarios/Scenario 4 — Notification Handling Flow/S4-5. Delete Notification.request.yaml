$kind: http-request
description: Permanently deletes the notification from S4-2.
url: "{{base_url}}/api/notifications/{{notificationId}}"
method: DELETE
headers:
  Authorization: Bearer {{jwt_token}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('S4-5: Notification deleted', function () {
        pm.response.to.have.status(200);
        var json = pm.response.json();
        pm.expect(json.success).to.be.true;
        pm.collectionVariables.set('notificationId', '');
        console.log('✅ S4-5 Delete Notification: PASSED');
        console.log('✅ SCENARIO 4 COMPLETE');
      });
    language: text/javascript
order: 5000
