$kind: http-request
description: Retrieves all notifications. Auto-saves first notification's _id.
url: "{{base_url}}/api/notifications"
method: GET
headers:
  Authorization: Bearer {{jwt_token}}
scripts:
  - type: afterResponse
    code: >-
      pm.test('S4-2: Notifications list returned', function () {
        pm.response.to.have.status(200);
        var json = pm.response.json();
        pm.expect(json.success).to.be.true;
        pm.expect(json.notifications).to.be.an('array');
        if (json.notifications.length > 0) {
          pm.collectionVariables.set('notificationId', json.notifications[0]._id);
          console.log('✅ S4-2 Notifications: PASSED — notificationId saved: ' + json.notifications[0]._id);
        } else {
          console.log('⚠️ S4-2 Notifications: PASSED but no notifications exist — S4-4 and S4-5 may fail');
        }
      });
    language: text/javascript
order: 2000
